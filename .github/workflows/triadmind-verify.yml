name: triadmind-verify

on:
  push:
    branches: [main]
  pull_request:

jobs:
  topology-gates:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Sync topology artifacts
        run: node --import tsx cli.ts sync --force

      - name: Build runtime visualizer artifacts
        run: node --import tsx cli.ts runtime --visualize --view full

      - name: Govern hard gate
        run: node --import tsx cli.ts govern ci --policy .triadmind/govern-policy.json --json
